name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
      - name: Skip npm publish when NPM_TOKEN is unavailable
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is not configured for this repository, so npm publish was skipped."
